<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>AuraConv‑Multi v4 — 50‑Track Block Filter</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-elev: #131313;
            --bg-card: #161616;
            --bg-input: #1a1a1a;
            --border: #242424;
            --border-hov: #3a3a3a;
            --text: #f0f0f0;
            --text-muted: #888;
            --text-dim: #555;
            --accent: #667eea;
            --success: #10b981;
            --danger: #f5576c;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="light"] {
            --bg: #ececec;
            --bg-elev: #fff;
            --bg-card: #f9f9f9;
            --bg-input: #f0f0f0;
            --border: #d4d4d4;
            --border-hov: #aaa;
            --text: #1a1a1a;
            --text-muted: #666;
            --text-dim: #999;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); color: var(--text);
            min-height:100vh; display:flex; flex-direction:column;
            transition: background var(--transition), color var(--transition);
            overflow-x:hidden;
        }
        .app {
            flex:1; display:flex; flex-direction:column;
            padding:10px 14px 18px; max-width:960px; margin:0 auto; width:100%;
        }
        header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:10px; padding-top:6px; flex-wrap:wrap; gap:8px;
        }
        .title-block h1 {
            font-size:1.7rem; font-weight:200; letter-spacing:-0.03em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; line-height:1.1;
        }
        .subtitle {
            color:var(--text-muted); font-size:0.68rem;
            letter-spacing:0.1em; text-transform:uppercase; margin-top:1px;
        }
        .theme-toggle {
            background:var(--bg-elev); border:1px solid var(--border);
            color:var(--text); width:36px; height:36px; border-radius:50%;
            font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
            transition:var(--transition);
        }
        .theme-toggle:hover { border-color:var(--border-hov); transform:scale(1.05); }
        .warning {
            background:rgba(245,87,108,0.08); border:1px solid rgba(245,87,108,0.35);
            color:var(--danger); padding:10px 14px; border-radius:var(--radius-sm);
            text-align:center; font-size:0.8rem; margin-bottom:10px; display:none;
        }
        .warning.show { display:block; }
        .global-controls {
            background:var(--bg-elev); border:1px solid var(--border);
            border-radius:var(--radius); padding:10px 14px; margin-bottom:10px;
            display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center;
            transition:var(--transition);
        }
        .global-controls label {
            font-size:0.7rem; color:var(--text-muted); text-transform:uppercase;
            letter-spacing:0.04em; display:flex; align-items:center; gap:5px; white-space:nowrap;
        }
        .global-controls input[type="range"] {
            width:80px; height:5px; border-radius:3px; background:var(--bg-input);
            -webkit-appearance:none; appearance:none; cursor:pointer; outline:none;
        }
        .global-controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
            background:var(--accent); cursor:pointer; box-shadow:0 1px 5px rgba(102,126,234,0.3);
        }
        .global-val {
            font-size:0.68rem; color:var(--accent); font-weight:700;
            font-family:'SF Mono','Courier New',monospace; min-width:32px; text-align:right;
        }
        .toggle-sm {
            padding:5px 11px; border-radius:16px; font-size:0.68rem; cursor:pointer;
            border:1px solid var(--border); background:transparent; color:var(--text);
            transition:var(--transition); font-weight:600; letter-spacing:0.03em;
        }
        .toggle-sm.active { background:var(--success); border-color:var(--success); color:#fff; }
        .btn-start {
            padding:9px 20px; border-radius:20px; font-size:0.8rem; font-weight:700;
            cursor:pointer; border:none; color:#fff;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition:var(--transition); letter-spacing:0.03em;
        }
        .btn-start:hover { opacity:0.9; }
        .btn-start.stop { background: linear-gradient(135deg, #f5576c, #c0392b); }

        .track-grid {
            display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:10px;
        }
        @media (max-width:780px) { .track-grid { grid-template-columns: repeat(2, 1fr); gap:6px; } }
        @media (max-width:440px) {
            .track-grid { grid-template-columns: 1fr 1fr; gap:5px; }
            .global-controls { gap:5px 8px; padding:8px 10px; }
            .global-controls input[type="range"] { width:50px; }
            .global-controls label { font-size:0.65rem; }
        }

        .track-card {
            background:var(--bg-card); border:1px solid var(--border);
            border-radius:var(--radius); overflow:hidden;
            transition: border-color var(--transition), box-shadow var(--transition);
            position:relative; display:flex; flex-direction:column;
        }
        .track-card.muted { opacity:0.5; filter:grayscale(0.35); }
        .track-card:hover { border-color:var(--border-hov); }
        .track-card-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:3px 6px; background:rgba(255,255,255,0.015);
            border-bottom:1px solid var(--border); gap:4px; min-height:28px;
        }
        .track-label {
            font-size:0.62rem; font-weight:700; letter-spacing:0.02em;
            font-family:'SF Mono','Courier New',monospace; color:var(--text);
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:55px;
        }
        .track-color-dot {
            width:6px; height:6px; border-radius:50%; flex-shrink:0;
        }
        .track-mute-btn {
            width:24px; height:24px; border-radius:50%; border:1px solid var(--border);
            background:transparent; cursor:pointer; font-size:0.6rem;
            display:flex; align-items:center; justify-content:center;
            transition:var(--transition); color:var(--text); flex-shrink:0; font-weight:700;
        }
        .track-mute-btn:hover { border-color:var(--border-hov); }
        .track-mute-btn.muted { background:var(--danger); border-color:var(--danger); color:#fff; }
        .vol-slider {
            -webkit-appearance:none; appearance:none; width:45px; height:4px;
            background:var(--bg-input); border-radius:2px; outline:none; cursor:pointer;
            margin:0 3px; flex-shrink:1; min-width:30px;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:10px; height:10px; border-radius:50%;
            background:var(--accent); cursor:pointer; opacity:0.8;
        }
        .track-canvas-wrap {
            position:relative; flex:1; min-height:60px; background:#080808; cursor:default;
        }
        [data-theme="light"] .track-canvas-wrap { background:#e6e6e6; }
        .track-canvas-wrap canvas { display:block; width:100%; height:100%; }
        .track-info-overlay {
            position:absolute; top:3px; right:5px; font-size:0.52rem;
            color:var(--text-dim); font-family:'SF Mono','Courier New',monospace;
            pointer-events:none; display:flex; flex-direction:column; align-items:flex-end; gap:1px;
        }
        .gate-status {
            font-weight:700; font-size:0.55rem; letter-spacing:0.04em; transition: color 0.15s;
        }
        .gate-status.on { color:#10b981; text-shadow:0 0 6px rgba(16,185,129,0.5); }
        .gate-status.off { color:#555; }
        [data-theme="light"] .gate-status.off { color:#999; }
        .footer-info {
            text-align:center; color:var(--text-dim); font-size:0.68rem;
            line-height:1.5; padding-top:2px;
        }
        .kbd {
            display:inline-block; padding:1px 5px; background:var(--bg-input);
            border:1px solid var(--border); border-radius:3px; font-family:monospace;
            font-size:0.62rem; color:var(--text-muted);
        }
        select.small-select {
            background:var(--bg-input); color:var(--text); border:1px solid var(--border);
            border-radius:4px; padding:2px 6px; font-size:0.68rem; cursor:pointer; outline:none;
        }
    </style>
</head>
<body>
    <div class="app">
        <header>
            <div class="title-block">
                <h1>AuraConv‑Multi</h1>
                <div class="subtitle">v4 · 50‑Track Block Filter · Per‑track vol · AGC</div>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀</button>
        </header>

        <div class="warning" id="warning"></div>

        <div class="global-controls" id="globalControls">
            <label>Dur
                <input type="range" id="durSlider" min="1" max="99" value="50">
                <span class="global-val" id="durVal">50%</span>
            </label>
            <button class="toggle-sm" id="invertBtn">Invert</button>
            <label>Fade
                <select id="fadeSelect" class="small-select">
                    <option value="1">Off</option>
                    <option value="0.5">Low</option>
                    <option value="0.75" selected>Med</option>
                    <option value="0.9">High</option>
                </select>
            </label>
            <label>AGC
                <select id="agcSelect" class="small-select">
                    <option value="0">Off</option>
                    <option value="0.005" selected>Low</option>
                    <option value="0.01">Med</option>
                    <option value="0.02">High</option>
                </select>
            </label>
            <label>Decay
                <input type="range" id="decaySlider" min="0.5" max="12" value="3" step="0.1">
                <span class="global-val" id="decayVal">3.0s</span>
            </label>
            <label>D/W
                <input type="range" id="dwSlider" min="0" max="100" value="40">
                <span class="global-val" id="dwVal">40%</span>
            </label>
            <label>Master
                <input type="range" id="masterSlider" min="0" max="100" value="70">
                <span class="global-val" id="masterVal">70%</span>
            </label>
            <button class="btn-start" id="startBtn">Start Audio</button>
        </div>

        <div class="track-grid" id="trackGrid"></div>

        <div class="footer-info">
            Press <span class="kbd">Space</span> to toggle · 50 tracks (10 → 1M samples) · AGC keeps output steady (±10%)
            <br><small>Per‑track volume slider ⬤  Auto‑fade smooths gate edges · AGC Off/Low/Med/High</small>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  AUDIOWORKLET PROCESSOR (fixed gate + fade + AGC)
        // ═══════════════════════════════════════════════════════════
        const workletCode = `
class BlockProcessor extends AudioWorkletProcessor {
  constructor(options) {
    super();
    this.blockSamples = options.processorOptions?.blockSamples || 50;
    this.blockDuration = 0.5;
    this.invertBlocking = false;
    this.fadeStart = 1.0;
    // AGC
    this.agcGain = 1.0;
    this.agcSmoothing = 0;           // 0 = disabled
    this.targetRms = 0.1;            // -20 dBFS
    this.maxGain = this.targetRms * 1.1;   // +10%
    this.minGain = this.targetRms * 0.9;   // -10%
    this.sampleCounter = 0;
    this.lastPosMsgTime = 0;
    this.port.onmessage = (e) => {
      if (e.data.key === 'blockDuration') this.blockDuration = e.data.value;
      if (e.data.key === 'invertBlocking') this.invertBlocking = e.data.value;
      if (e.data.key === 'fadeStart') this.fadeStart = e.data.value;
      if (e.data.key === 'agcSmoothing') {
        this.agcSmoothing = parseFloat(e.data.value);
        if (this.agcSmoothing === 0) this.agcGain = 1.0; // reset
      }
      if (e.data.key === 'reset') this.sampleCounter = 0;
    };
  }
  process(inputs, outputs) {
    const inData = inputs[0]?.[0];
    const outData = outputs[0]?.[0];
    if (!inData || !outData) return true;
    const bs = this.blockSamples;
    const blockLen = Math.max(0, Math.round(bs * this.blockDuration));
    const invert = this.invertBlocking;
    const fadeStart = this.fadeStart;

    for (let i = 0; i < outData.length; i++) {
      this.sampleCounter++;
      const pos = this.sampleCounter % bs;
      const inZone = pos < blockLen;
      const open = invert ? !inZone : inZone;

      if (!open) {
        outData[i] = 0;
        continue;
      }

      let segStart, segEnd;
      if (!invert) { segStart = 0; segEnd = blockLen; }
      else        { segStart = blockLen; segEnd = bs; }
      const segLength = segEnd - segStart;
      const distToEnd = segEnd - pos;
      const fadeThreshold = segLength * (1 - fadeStart);

      let env = 1;
      if (fadeThreshold > 0 && distToEnd < fadeThreshold) {
        env = distToEnd / fadeThreshold;
      }
      outData[i] = inData[i] * env;
    }

    // ─── AGC (applied after gating) ───
    if (this.agcSmoothing > 0) {
      // Measure RMS of the output block (only non‑zero samples)
      let sum = 0;
      let count = 0;
      for (let i = 0; i < outData.length; i++) {
        const v = outData[i];
        if (v !== 0) {
          sum += v * v;
          count++;
        }
      }
      if (count > 0) {
        const rms = Math.sqrt(sum / count);
        let desiredGain = this.targetRms / (rms + 0.0001);
        // Clamp to allowed range (±10% of target)
        desiredGain = Math.min(this.maxGain, Math.max(this.minGain, desiredGain));
        // Smooth
        this.agcGain += this.agcSmoothing * (desiredGain - this.agcGain);
      }
      // Apply AGC gain
      for (let i = 0; i < outData.length; i++) {
        outData[i] *= this.agcGain;
      }
    }

    if (currentTime - this.lastPosMsgTime >= 0.05) {
      this.lastPosMsgTime = currentTime;
      this.port.postMessage({ pos: this.sampleCounter % bs, bs });
    }
    return true;
  }
}
registerProcessor('block-processor', BlockProcessor);
`;

        // ═══════════════════════════════════════════════════════════
        //  TRACK DEFINITIONS – 50 tracks, log‑spread 10 → 1M
        // ═══════════════════════════════════════════════════════════
        const TRACK_BLOCK_SIZES = [
            10, 13, 16, 20, 26, 33, 42, 53, 67, 84,
            106, 134, 169, 214, 271, 342, 432, 546, 691, 874,
            1106, 1399, 1770, 2240, 2834, 3585, 4536, 5740, 7263, 9190,
            11627, 14712, 18616, 23556, 29805, 37709, 47713, 60366, 76375, 96633,
            122262, 154683, 195707, 247621, 313314, 396400, 501536, 634557, 802870, 1000000
        ];

        const TRACK_COLORS = Array.from({ length: 50 }, (_, i) => {
            const hue = (i * 7.2) % 360;
            return `hsl(${hue}, 70%, 55%)`;
        });

        function formatBlockLabel(bs) {
            if (bs < 1000) return bs.toString();
            if (bs >= 1000000) return '1M';
            const k = bs / 1000;
            return (k % 1 === 0 ? k.toString() : k.toFixed(1)) + 'k';
        }
        const TRACK_LABELS = TRACK_BLOCK_SIZES.map(formatBlockLabel);

        // ═══════════════════════════════════════════════════════════
        //  STATE
        // ═══════════════════════════════════════════════════════════
        const state = {
            audioContext: null, micStream: null, micNode: null,
            isRunning: false, workletModuleLoaded: false, tracks: [],
            masterGain: null, convolver: null, dryGain: null, wetGain: null,
            blockDuration: 0.5, invertBlocking: false,
            fadeStart: 0.75,          // default Med
            agcSmoothing: 0.005,      // default Low
            decayTime: 3.0, dryWetMix: 0.4, masterVolume: 0.7,
            animFrameId: null, frameSkip: 0,
        };

        const $ = (id) => document.getElementById(id);
        const dom = {
            trackGrid: $('trackGrid'), startBtn: $('startBtn'), warning: $('warning'),
            themeToggle: $('themeToggle'), durSlider: $('durSlider'), durVal: $('durVal'),
            invertBtn: $('invertBtn'), fadeSelect: $('fadeSelect'),
            agcSelect: $('agcSelect'),
            decaySlider: $('decaySlider'), decayVal: $('decayVal'),
            dwSlider: $('dwSlider'), dwVal: $('dwVal'),
            masterSlider: $('masterSlider'), masterVal: $('masterVal'),
        };

        // ═══════════════════════════════════════════════════════════
        //  BUILD TRACK UI (50 tracks) + per‑track volume slider
        // ═══════════════════════════════════════════════════════════
        function buildTrackUI() {
            dom.trackGrid.innerHTML = '';
            TRACK_BLOCK_SIZES.forEach((bs, i) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.dataset.index = i;
                card.innerHTML = `
                <div class="track-card-header">
                  <span class="track-color-dot" style="background:${TRACK_COLORS[i]};box-shadow:0 0 5px ${TRACK_COLORS[i]}44;"></span>
                  <span class="track-label">${TRACK_LABELS[i]} sp</span>
                  <input type="range" class="vol-slider" id="volSlider${i}" min="0" max="100" value="70" title="Track volume">
                  <button class="track-mute-btn" data-index="${i}" title="Mute track">M</button>
                </div>
                <div class="track-canvas-wrap">
                  <canvas></canvas>
                  <div class="track-info-overlay">
                    <span class="gate-status off" id="gateStatus${i}">GATE OFF</span>
                    <span class="db-indicator" id="dbIndicator${i}">–– dB</span>
                  </div>
                </div>`;
                dom.trackGrid.appendChild(card);

                const canvas = card.querySelector('canvas');
                const ctx = canvas.getContext('2d');
                const volSlider = card.querySelector(`#volSlider${i}`);

                const trackObj = {
                    worklet: null, analyser: null, gain: null, muted: false,
                    canvas, ctx, color: TRACK_COLORS[i],
                    blockSamples: bs, label: TRACK_LABELS[i], card,
                    vol: 0.7,
                    _displayW: 180, _displayH: 60,
                    _gatePos: 0, _gateBs: bs,
                    _gateStatusEl: card.querySelector(`#gateStatus${i}`),
                    _dbEl: card.querySelector(`#dbIndicator${i}`),
                    _volSlider: volSlider,
                };

                volSlider.addEventListener('input', (e) => {
                    const val = parseInt(e.target.value) / 100;
                    trackObj.vol = val;
                    if (trackObj.gain && state.audioContext) {
                        trackObj.gain.gain.setTargetAtTime(
                            trackObj.muted ? 0 : val,
                            state.audioContext.currentTime, 0.03
                        );
                    }
                });

                const muteBtn = card.querySelector('.track-mute-btn');
                muteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleTrackMute(i);
                });

                state.tracks[i] = trackObj;
            });
            resizeAllCanvases();
        }

        function toggleTrackMute(index) {
            const t = state.tracks[index];
            if (!t) return;
            t.muted = !t.muted;
            if (t.gain && state.audioContext) {
                const now = state.audioContext.currentTime;
                t.gain.gain.setTargetAtTime(t.muted ? 0 : t.vol, now, 0.03);
            }
            t.card.classList.toggle('muted', t.muted);
            const btn = t.card.querySelector('.track-mute-btn');
            if (btn) {
                btn.classList.toggle('muted', t.muted);
                btn.textContent = t.muted ? 'U' : 'M';
            }
        }

        function resizeAllCanvases() {
            state.tracks.forEach(t => {
                if (!t.canvas) return;
                const dpr = window.devicePixelRatio || 1;
                const wrap = t.canvas.parentElement;
                if (!wrap) return;
                const rect = wrap.getBoundingClientRect();
                const w = rect.width || 200;
                const h = rect.height || 60;
                t.canvas.width = w * dpr;
                t.canvas.height = h * dpr;
                t.ctx.setTransform(1, 0, 0, 1, 0, 0);
                t.ctx.scale(dpr, dpr);
                t._displayW = w;
                t._displayH = h;
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  AUDIO SETUP
        // ═══════════════════════════════════════════════════════════
        async function startAudio() {
            try {
                if (!state.audioContext) {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    state.audioContext = new AC();
                    state.workletModuleLoaded = false;
                }
                const ctx = state.audioContext;
                if (ctx.state === 'suspended') await ctx.resume();

                if (!state.workletModuleLoaded) {
                    const blob = new Blob([workletCode], { type: 'application/javascript' });
                    const url = URL.createObjectURL(blob);
                    try {
                        await ctx.audioWorklet.addModule(url);
                        state.workletModuleLoaded = true;
                    } catch (err) {
                        if (err.message && err.message.includes('already registered')) {
                            state.workletModuleLoaded = true;
                        } else throw err;
                    }
                    URL.revokeObjectURL(url);
                }

                state.micStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });
                state.micNode = ctx.createMediaStreamSource(state.micStream);

                state.masterGain = ctx.createGain(); state.masterGain.gain.value = state.masterVolume;
                state.dryGain = ctx.createGain(); state.dryGain.gain.value = 1 - state.dryWetMix;
                state.wetGain = ctx.createGain(); state.wetGain.gain.value = state.dryWetMix;
                state.convolver = ctx.createConvolver();
                state.convolver.buffer = createImpulseResponse(state.decayTime);
                state.masterGain.connect(state.dryGain);
                state.masterGain.connect(state.convolver);
                state.convolver.connect(state.wetGain);
                state.dryGain.connect(ctx.destination);
                state.wetGain.connect(ctx.destination);

                for (let i = 0; i < TRACK_BLOCK_SIZES.length; i++) {
                    const t = state.tracks[i];
                    const bs = TRACK_BLOCK_SIZES[i];

                    const wn = new AudioWorkletNode(ctx, 'block-processor', {
                        numberOfInputs: 1, numberOfOutputs: 1,
                        outputChannelCount: [1], channelCount: 1,
                        channelCountMode: 'explicit',
                        processorOptions: { blockSamples: bs },
                    });
                    wn.port.postMessage({ key: 'blockDuration', value: state.blockDuration });
                    wn.port.postMessage({ key: 'invertBlocking', value: state.invertBlocking });
                    wn.port.postMessage({ key: 'fadeStart', value: state.fadeStart });
                    wn.port.postMessage({ key: 'agcSmoothing', value: state.agcSmoothing });
                    wn.port.onmessage = (e) => {
                        if (e.data && typeof e.data.pos === 'number') {
                            t._gatePos = e.data.pos;
                            t._gateBs = e.data.bs || bs;
                        }
                    };
                    t.worklet = wn;

                    const an = ctx.createAnalyser();
                    an.fftSize = 128; an.smoothingTimeConstant = 0.55;
                    t.analyser = an;

                    const gn = ctx.createGain();
                    gn.gain.value = t.muted ? 0 : t.vol;
                    t.gain = gn;

                    state.micNode.connect(wn);
                    wn.connect(an);
                    an.connect(gn);
                    gn.connect(state.masterGain);

                    t._gatePos = 0;
                    t._gateBs = bs;
                }

                state.isRunning = true;
                dom.startBtn.textContent = 'Stop Audio';
                dom.startBtn.classList.add('stop');
                dom.warning.classList.remove('show');
                updateAllMuteButtons();
                startVisualization();
            } catch (err) {
                console.error('Audio setup error:', err);
                dom.warning.classList.add('show');
                dom.warning.textContent = 'Error: ' + err.message +
                    '. Ensure mic access is allowed (HTTPS/localhost).';
            }
        }

        function stopAudio() {
            if (state.animFrameId) { cancelAnimationFrame(state.animFrameId); state.animFrameId = null; }
            state.tracks.forEach(t => {
                if (t.worklet) { try { t.worklet.disconnect(); } catch {} }
                if (t.analyser) { try { t.analyser.disconnect(); } catch {} }
                if (t.gain) { try { t.gain.disconnect(); } catch {} }
                t.worklet = null; t.analyser = null; t.gain = null; t._gatePos = 0;
            });
            [state.masterGain, state.dryGain, state.wetGain, state.convolver].forEach(n => {
                if (n) { try { n.disconnect(); } catch {} }
            });
            state.masterGain = state.dryGain = state.wetGain = state.convolver = null;
            if (state.micStream) { state.micStream.getTracks().forEach(t => t.stop()); state.micStream = null; }
            if (state.micNode) { try { state.micNode.disconnect(); } catch {} state.micNode = null; }

            state.isRunning = false;
            dom.startBtn.textContent = 'Start Audio';
            dom.startBtn.classList.remove('stop');
            state.tracks.forEach(t => {
                if (t.ctx && t._displayW) { t.ctx.clearRect(0,0,t._displayW,t._displayH); drawIdleTrack(t); }
                if (t._gateStatusEl) {
                    t._gateStatusEl.textContent = 'GATE OFF';
                    t._gateStatusEl.classList.remove('on'); t._gateStatusEl.classList.add('off');
                }
                if (t._dbEl) t._dbEl.textContent = '–– dB';
            });
            updateAllMuteButtons();
        }

        function createImpulseResponse(duration) {
            const sr = state.audioContext.sampleRate;
            const len = Math.max(1, Math.floor(sr * duration));
            const buf = state.audioContext.createBuffer(2, len, sr);
            for (let ch = 0; ch < 2; ch++) {
                const d = buf.getChannelData(ch);
                for (let i = 0; i < len; i++) {
                    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
                }
            }
            return buf;
        }

        function updateAllMuteButtons() {
            state.tracks.forEach(t => {
                const btn = t.card?.querySelector('.track-mute-btn');
                if (btn) {
                    btn.classList.toggle('muted', t.muted);
                    btn.textContent = t.muted ? 'U' : 'M';
                }
                if (t.card) t.card.classList.toggle('muted', t.muted);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  GLOBAL PARAM UPDATES
        // ═══════════════════════════════════════════════════════════
        function broadcastParam(key, value) {
            state.tracks.forEach(t => { if (t.worklet) t.worklet.port.postMessage({ key, value }); });
        }

        function updateBlockDuration(val) {
            state.blockDuration = val;
            dom.durVal.textContent = Math.round(val * 100) + '%';
            broadcastParam('blockDuration', val);
        }

        function updateInvertBlocking(val) {
            state.invertBlocking = val;
            dom.invertBtn.classList.toggle('active', val);
            broadcastParam('invertBlocking', val);
        }

        function updateFadeStart(val) {
            state.fadeStart = parseFloat(val);
            broadcastParam('fadeStart', state.fadeStart);
        }

        function updateAgcSmoothing(val) {
            state.agcSmoothing = parseFloat(val);
            broadcastParam('agcSmoothing', state.agcSmoothing);
        }

        function updateDecayTime(val) {
            state.decayTime = val;
            dom.decayVal.textContent = val.toFixed(1) + 's';
            if (state.convolver && state.audioContext) {
                state.convolver.buffer = createImpulseResponse(val);
            }
        }

        function updateDryWetMix(val) {
            state.dryWetMix = val;
            dom.dwVal.textContent = Math.round(val * 100) + '%';
            if (state.dryGain && state.wetGain && state.audioContext) {
                const now = state.audioContext.currentTime;
                state.dryGain.gain.setTargetAtTime(1 - val, now, 0.02);
                state.wetGain.gain.setTargetAtTime(val, now, 0.02);
            }
        }

        function updateMasterVolume(val) {
            state.masterVolume = val;
            dom.masterVal.textContent = Math.round(val * 100) + '%';
            if (state.masterGain && state.audioContext) {
                state.masterGain.gain.setTargetAtTime(val, state.audioContext.currentTime, 0.02);
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  VISUALISATION (unchanged)
        // ═══════════════════════════════════════════════════════════
        function drawIdleTrack(t) {
            const ctx = t.ctx, w = t._displayW || 200, h = t._displayH || 60;
            ctx.clearRect(0,0,w,h);
            ctx.strokeStyle = t.color + '33'; ctx.lineWidth = 0.8;
            ctx.setLineDash([4,8]); ctx.beginPath();
            ctx.moveTo(0, h/2); ctx.lineTo(w, h/2); ctx.stroke();
            ctx.setLineDash([]);
            const barY = h-6, barH = 4;
            ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fillRect(0, barY, w, barH);
        }

        function startVisualization() {
            function loop() {
                state.animFrameId = requestAnimationFrame(loop);
                state.frameSkip = (state.frameSkip + 1) % 2;
                if (state.frameSkip !== 0) return;

                state.tracks.forEach(t => {
                    if (!t.analyser || !t.ctx || !t._displayW) return;
                    const w = t._displayW, h = t._displayH, ctx = t.ctx;
                    const an = t.analyser, bufLen = an.fftSize;
                    const timeData = new Uint8Array(bufLen);
                    an.getByteTimeDomainData(timeData);

                    let sum = 0;
                    for (let i = 0; i < bufLen; i++) {
                        const v = (timeData[i] - 128) / 128;
                        sum += v * v;
                    }
                    const rms = Math.sqrt(sum / bufLen);
                    const db = rms > 0.0005 ? Math.round(20 * Math.log10(rms)) : -60;
                    if (t._dbEl) t._dbEl.textContent = (db <= -60 ? '––' : db) + ' dB';

                    const bs = t._gateBs || t.blockSamples;
                    const blockLen = Math.max(0, Math.round(bs * state.blockDuration));
                    const pos = t._gatePos || 0;
                    const inZone = pos < blockLen;
                    const open = state.invertBlocking ? !inZone : inZone;

                    ctx.clearRect(0,0,w,h);

                    ctx.strokeStyle = t.muted ? '#444' : t.color;
                    ctx.lineWidth = t.muted ? 0.7 : 1.3;
                    ctx.shadowColor = t.muted ? 'transparent' : (t.color + '66');
                    ctx.shadowBlur = t.muted ? 0 : 3;
                    ctx.beginPath();
                    const waveAreaBottom = h - 10, waveCenter = waveAreaBottom / 2, waveAmp = waveAreaBottom * 0.42;
                    for (let i = 0; i < bufLen; i++) {
                        const x = (i / bufLen) * w;
                        const y = waveCenter + ((timeData[i] - 128) / 128) * waveAmp;
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    const barY = h - 7, barH = 4;
                    ctx.fillStyle = t.muted ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.05)';
                    ctx.beginPath(); ctx.roundRect(0, barY, w, barH, 2); ctx.fill();

                    let activeStart, activeEnd;
                    if (!state.invertBlocking) {
                        activeStart = 0;
                        activeEnd = (blockLen / bs) * w;
                    } else {
                        activeStart = (blockLen / bs) * w;
                        activeEnd = w;
                    }
                    const activeW = activeEnd - activeStart;
                    if (activeW > 0.5) {
                        ctx.fillStyle = t.muted ? 'rgba(255,255,255,0.06)' : (t.color + '33');
                        ctx.beginPath(); ctx.roundRect(activeStart, barY, activeW, barH, 2); ctx.fill();
                    }

                    const posX = (pos / bs) * w;
                    ctx.fillStyle = open ? t.color : 'rgba(255,255,255,0.25)';
                    ctx.shadowColor = open ? t.color : 'transparent';
                    ctx.shadowBlur = open ? 5 : 0;
                    ctx.beginPath(); ctx.arc(posX, barY + barH/2, 3, 0, Math.PI*2); ctx.fill();
                    ctx.shadowBlur = 0;

                    if (t._gateStatusEl) {
                        t._gateStatusEl.textContent = open ? 'GATE ON' : 'GATE OFF';
                        if (open) {
                            t._gateStatusEl.classList.add('on'); t._gateStatusEl.classList.remove('off');
                            t._gateStatusEl.style.color = t.color;
                        } else {
                            t._gateStatusEl.classList.remove('on'); t._gateStatusEl.classList.add('off');
                            t._gateStatusEl.style.color = '';
                        }
                    }
                });
            }
            loop();
        }

        // ═══════════════════════════════════════════════════════════
        //  EVENT LISTENERS
        // ═══════════════════════════════════════════════════════════
        function setupEventListeners() {
            const savedTheme = localStorage.getItem('auraconv-multi-v4-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            dom.themeToggle.textContent = savedTheme === 'dark' ? '☀' : '🌙';
            dom.themeToggle.addEventListener('click', () => {
                const cur = document.documentElement.getAttribute('data-theme');
                const nxt = cur === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', nxt);
                localStorage.setItem('auraconv-multi-v4-theme', nxt);
                dom.themeToggle.textContent = nxt === 'dark' ? '☀' : '🌙';
                document.querySelector('meta[name="theme-color"]')
                    ?.setAttribute('content', nxt === 'dark' ? '#0a0a0a' : '#ececec');
            });

            dom.startBtn.addEventListener('click', () => {
                if (state.isRunning) stopAudio(); else startAudio();
            });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT'
                    && e.target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    dom.startBtn.click();
                }
            });

            dom.durSlider.addEventListener('input', (e) => updateBlockDuration(parseInt(e.target.value) / 100));
            dom.invertBtn.addEventListener('click', () => updateInvertBlocking(!state.invertBlocking));
            dom.fadeSelect.addEventListener('change', (e) => updateFadeStart(e.target.value));
            dom.agcSelect.addEventListener('change', (e) => updateAgcSmoothing(e.target.value));
            dom.decaySlider.addEventListener('input', (e) => updateDecayTime(parseFloat(e.target.value)));
            dom.dwSlider.addEventListener('input', (e) => updateDryWetMix(parseInt(e.target.value) / 100));
            dom.masterSlider.addEventListener('input', (e) => updateMasterVolume(parseInt(e.target.value) / 100));

            window.addEventListener('resize', () => {
                resizeAllCanvases();
                if (!state.isRunning) state.tracks.forEach(t => drawIdleTrack(t));
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════
        function init() {
            state.tracks = new Array(TRACK_BLOCK_SIZES.length).fill(null).map(() => ({
                worklet: null, analyser: null, gain: null, muted: false,
                canvas: null, ctx: null, color: '#888', blockSamples: 50, label: '', card: null,
                vol: 0.7, _displayW: 200, _displayH: 60, _gatePos: 0, _gateBs: 50,
                _gateStatusEl: null, _dbEl: null, _volSlider: null,
            }));
            buildTrackUI();
            setupEventListeners();
            setTimeout(() => {
                resizeAllCanvases();
                state.tracks.forEach(t => drawIdleTrack(t));
            }, 120);
            dom.invertBtn.classList.toggle('active', state.invertBlocking);
            dom.fadeSelect.value = state.fadeStart;
            dom.agcSelect.value = state.agcSmoothing;
        }
        init();
    </script>
</body>
    </html>
